[files]
# TRON protocol buffer definitions are third-party — do not check for typos.
extend-exclude = ["crates/provider/proto/"]

[default.extend-words]
# "ot" appears in the well-known TRON base58 address TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t
# and is not a misspelling.
ot = "ot"
# "abd" appears in the EVM function selector 0x06661abd (count() on the Counter contract).
abd = "abd"
# "entrys" is the literal JSON field name in the ABI format returned by TRON nodes.
entrys = "entrys"
